server:
  port: 8080

spring:
  application:
    name: tn-smartbus-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/tnsmartbus
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

app:
  jwt:
    secret: ${JWT_SECRET:tnSmartBusSuperSecretKeyChangeInProductionEnvironment2026}
    expiration-ms: 86400000 # 24 hours

  gps-simulator:
    enabled: true
    tick-interval-ms: 5000 # matches "refresh every 5 seconds" requirement

  ai-service:
    base-url: ${AI_SERVICE_URL:http://localhost:8000}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.tnsmartbus: INFO
